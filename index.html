<!DOCTYPE html>
<html>
<head>
    <title>Мой первый сайт</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            background-color: #f0f4f8;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        /* Стили для нашей новой картинки /
        .card-image {
            width: 120px;          / Ширина картинки /
            height: 120px;         / Высота картинки /
            object-fit: cover;     / Чтобы картинка не растягивалась уродливо /
            border-radius: 50%;    / Делает картинку идеально круглой /
            margin-bottom: 20px;   / Отступ снизу до заголовка /
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); / Легкая тень вокруг фото */
        }
        h1 {
            color: #102a43;
            margin-bottom: 15px;
            margin-top: 0;
        }
        p {
            color: #627d98;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Вот эта строчка вставляет твою круглую картинку -->
        <img src="photo.jpg" alt="Моё фото" class="card-image">
        
        <h1>Привет, мир!</h1>
        <p>Это мой самый первый site, созданный своими руками. Теперь он выглядит как стильный современный лендинг!</p>
    </div>

</body>
</html>
