<!DOCTYPE html>
<html>
<head>
    <title>Мой первый сайт</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            background-color: #f0f4f8;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .card-image {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #102a43;
            margin-bottom: 15px;
            margin-top: 0;
        }
        p {
            color: #627d98;
            line-height: 1.6;
            margin-bottom: 25px; /* Сделали отступ снизу для кнопки /
        }
        / Стили для нашей новой кнопки /
        .btn {
            display: inline-block;
            background-color: #0077ff; / Красивый синий цвет /
            color: #ffffff;            / Белый текст /
            padding: 12px 30px;
            text-decoration: none;     / Убираем подчеркивание ссылки /
            border-radius: 8px;        / Закругление краев кнопки /
            font-weight: bold;
            transition: background-color 0.3s ease; / Плавное изменение цвета /
        }
            .btn:visited {
    color: #ffffff;            /* Текст всегда остается белым /
    background-color: #0077ff; / Фон всегда остается синим */
            }
            
        / Эффект при наведении мышки на кнопку /
        .btn:hover {
            background-color: #0055cc; / Темно-синий цвет при наведении */
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="photo.jpg" alt="Моё фото" class="card-image">
        <h1>Привет, мир!</h1>
        <p>Это мой самый первый site, созданный своими руками. Теперь он выглядит как стильный современный лендинг!</p>
        
        <!-- Вот наша интерактивная кнопка -->
        <a href="https://vk.com" target="_blank" class="btn">Написать мне во ВКонтакте</a>
    </div>

</body>
</html>
